<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIDS — Panel de control</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f8f9fb;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,0.08);
      --border2:  rgba(0,0,0,0.13);
      --text1:    #111318;
      --text2:    #5a6073;
      --text3:    #9098b0;
      --radius:   10px;
      --red:      #E24B4A; --red-bg:   #FCEBEB; --red-dk:   #A32D2D;
      --amber:    #EF9F27; --amber-bg: #FAEEDA; --amber-dk: #854F0B;
      --blue:     #378ADD; --blue-bg:  #E6F1FB; --blue-dk:  #185FA5;
      --green:    #1D9E75; --green-bg: #E1F5EE; --green-dk: #0F6E56;
      --purple:   #7F77DD; --purple-bg:#EEEDFE; --purple-dk:#3C3489;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text1);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo { font-size: 16px; font-weight: 600; color: var(--text1); letter-spacing: -0.01em; }
    .topbar-logo span { color: var(--purple); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge-online {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: var(--green-bg); color: var(--green-dk);
      border: 1px solid rgba(29,158,117,0.25);
    }
    .badge-online::before { content: "● "; font-size: 8px; vertical-align: 1px; }
    #last-update { font-size: 12px; color: var(--text3); }

    /* ── Layout ── */
    .main { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

    /* ── Metric cards ── */
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .metric-label {
      font-size: 11px; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .metric-val { font-size: 26px; font-weight: 600; line-height: 1; }
    .metric-sub { font-size: 11px; margin-top: 4px; color: var(--text3); }
    .metric-sub.up   { color: var(--red); }
    .metric-sub.good { color: var(--green); }

    /* ── Two-column row ── */
    .row2 { display: grid; grid-template-columns: 1.65fr 1fr; gap: 14px; margin-bottom: 14px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .panel-title {
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 14px;
    }

    /* ── Alert list ── */
    .alert-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .alert-row:last-child { border-bottom: none; }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-msg { font-weight: 500; color: var(--text1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .alert-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sev-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0; margin-top: 1px; font-weight: 500;
    }
    .sev-CRITICA { background: var(--red-bg);    color: var(--red-dk); }
    .sev-ALTA    { background: var(--amber-bg);  color: var(--amber-dk); }
    .sev-MEDIA   { background: var(--blue-bg);   color: var(--blue-dk); }
    .sev-BAJA    { background: var(--green-bg);  color: var(--green-dk); }

    .dot-CRITICA { background: var(--red); }
    .dot-ALTA    { background: var(--amber); }
    .dot-MEDIA   { background: var(--blue); }
    .dot-BAJA    { background: var(--green); }

    /* ── Bar rows ── */
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-lbl { width: 110px; color: var(--text2); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 4px; transition: width 0.5s ease; }
    .bar-num { width: 28px; text-align: right; color: var(--text1); font-weight: 500; }

    /* ── Chart wrapper ── */
    .chart-wrap { position: relative; width: 100%; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 13px; }
    .empty i { font-size: 32px; display: block; margin-bottom: 8px; }

    /* ── Loader ── */
    .loader { text-align: center; padding: 40px; color: var(--text3); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .row2, .row3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .metrics { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <i class="ti ti-shield-lock" style="font-size:20px;color:var(--purple);" aria-hidden="true"></i>
    <span class="topbar-logo"><span>HIDS</span> · Panel de control</span>
  </div>
  <div class="topbar-right">
    <span id="last-update">Cargando…</span>
    <span class="badge-online">En línea</span>
  </div>
</nav>

<main class="main" role="main">
  <h2 class="sr-only">Panel de control del sistema de detección de intrusiones</h2>

  <!-- Metric cards -->
  <section class="metrics" id="metrics">
    <div class="loader"><i class="ti ti-loader-2" style="font-size:24px;"></i></div>
  </section>

  <!-- Alerts + module bars -->
  <div class="row2">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-bell" aria-hidden="true" style="vertical-align:-1px;margin-right:5px;"></i>Alertas recientes</div>
      <div id="alert-list"><div class="loader"><i class="ti ti-loader-2" style="font-size:20px;"></i></div></div>
    </div>
    <div class="panel">
      <div class="panel-title"><i class="ti ti-layout-grid" aria-hidden="true" style="vertical-align:-1px;margin-right:5px;"></i>Alertas por módulo</div>
      <div id="module-bars"><div class="loader"><i class="ti ti-loader-2" style="font-size:20px;"></i></div></div>
    </div>
  </div>

  <!-- Charts row -->
  <div class="row2">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-chart-line" aria-hidden="true" style="vertical-align:-1px;margin-right:5px;"></i>Alertas por hora — últimas 24 h</div>
      <div class="chart-wrap" style="height:200px;">
        <canvas id="chart-hourly" role="img" aria-label="Gráfico de alertas por hora en las últimas 24 horas">Sin datos</canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title"><i class="ti ti-chart-donut" aria-hidden="true" style="vertical-align:-1px;margin-right:5px;"></i>Distribución por criticidad</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="chart-wrap" style="height:180px;flex:1;">
          <canvas id="chart-donut" role="img" aria-label="Gráfico de distribución por nivel de criticidad">Sin datos</canvas>
        </div>
        <div id="donut-legend" style="display:flex;flex-direction:column;gap:7px;font-size:12px;"></div>
      </div>
    </div>
  </div>

</main>

<script>
// ── Colores ────────────────────────────────────────────────────────────────
const COLORS = {
  CRITICA: { dot:'#E24B4A', bg:'#FCEBEB', dk:'#A32D2D' },
  ALTA:    { dot:'#EF9F27', bg:'#FAEEDA', dk:'#854F0B' },
  MEDIA:   { dot:'#378ADD', bg:'#E6F1FB', dk:'#185FA5' },
  BAJA:    { dot:'#1D9E75', bg:'#E1F5EE', dk:'#0F6E56' },
};
const MODULE_COLORS = ['#7F77DD','#378ADD','#1D9E75','#EF9F27','#E24B4A','#D4537E'];

let chartHourly = null;
let chartDonut  = null;

// ── Tiempo relativo ────────────────────────────────────────────────────────
function timeAgo(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60)  return `hace ${diff}s`;
  if (diff < 3600) return `hace ${Math.floor(diff/60)}m`;
  return `hace ${Math.floor(diff/3600)}h`;
}

// ── Renderizar métricas ────────────────────────────────────────────────────
function renderMetrics(s) {
  const el = document.getElementById('metrics');
  const pct = s.total ? ((s.by_criticidad.CRITICA / s.total) * 100).toFixed(0) : 0;
  el.innerHTML = `
    <div class="metric">
      <div class="metric-label"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Alertas totales</div>
      <div class="metric-val" style="color:var(--red)">${s.total}</div>
      <div class="metric-sub up">${s.by_criticidad.CRITICA} críticas (${pct}%)</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-server" aria-hidden="true"></i>Hosts afectados</div>
      <div class="metric-val">${s.hosts_afectados}</div>
      <div class="metric-sub">monitoreados activamente</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-cpu" aria-hidden="true"></i>Módulos activos</div>
      <div class="metric-val" style="color:var(--purple)">${Object.keys(s.by_modulo).length}</div>
      <div class="metric-sub good">todos reportando</div>
    </div>
    <div class="metric">
      <div class="metric-label"><i class="ti ti-shield-check" aria-hidden="true"></i>Alertas bajas</div>
      <div class="metric-val" style="color:var(--green)">${s.by_criticidad.BAJA}</div>
      <div class="metric-sub good">bajo riesgo</div>
    </div>
  `;
}

// ── Renderizar lista de alertas ────────────────────────────────────────────
function renderAlerts(recent) {
  const el = document.getElementById('alert-list');
  if (!recent.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-mood-happy"></i>Sin alertas registradas</div>';
    return;
  }
  el.innerHTML = recent.slice(0, 8).map(a => {
    const c = (a.criticidad || 'BAJA').toUpperCase();
    return `
      <div class="alert-row">
        <div class="alert-dot dot-${c}"></div>
        <div class="alert-body">
          <div class="alert-msg">${a.mensaje || '—'}</div>
          <div class="alert-meta">${a.modulo || ''} · ${a.host || 'host'} · ${timeAgo(a.timestamp)}</div>
        </div>
        <span class="sev-badge sev-${c}">${c}</span>
      </div>`;
  }).join('');
}

// ── Renderizar barras por módulo ───────────────────────────────────────────
function renderModuleBars(byModule) {
  const el = document.getElementById('module-bars');
  const entries = Object.entries(byModule).sort((a,b) => b[1]-a[1]);
  const max = entries[0]?.[1] || 1;
  if (!entries.length) { el.innerHTML = '<div class="empty"><i class="ti ti-box"></i>Sin datos de módulos</div>'; return; }
  el.innerHTML = entries.map(([mod, count], i) => `
    <div class="bar-row">
      <div class="bar-lbl" title="${mod}">${mod.replace('_monitor','').replace('_','\u00A0')}</div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${Math.round((count/max)*100)}%;background:${MODULE_COLORS[i % MODULE_COLORS.length]};"></div>
      </div>
      <div class="bar-num">${count}</div>
    </div>`).join('');
}

// ── Gráfico de línea — alertas por hora ───────────────────────────────────
function renderHourlyChart(hourly) {
  const labels = Array.from({length:24}, (_,i) => `${String(i).padStart(2,'0')}:00`);
  const data   = labels.map((_,i) => hourly[String(i)] || 0);
  if (chartHourly) chartHourly.destroy();
  chartHourly = new Chart(document.getElementById('chart-hourly'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Alertas',
        data,
        borderColor: '#7F77DD',
        backgroundColor: 'rgba(127,119,221,0.12)',
        fill: true,
        tension: 0.35,
        pointRadius: 2,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8, font:{size:11}, color:'#9098b0' }, grid:{display:false} },
        y: { ticks: { font:{size:11}, color:'#9098b0', stepSize:1 }, grid:{color:'rgba(0,0,0,0.05)'}, beginAtZero:true }
      }
    }
  });
}

// ── Gráfico de dona — por criticidad ──────────────────────────────────────
function renderDonutChart(byCrit) {
  const order  = ['CRITICA','ALTA','MEDIA','BAJA'];
  const labels = order.filter(k => byCrit[k] > 0);
  const data   = labels.map(k => byCrit[k]);
  const colors = labels.map(k => COLORS[k].dot);

  if (chartDonut) chartDonut.destroy();
  chartDonut = new Chart(document.getElementById('chart-donut'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: ctx => ` ${ctx.label}: ${ctx.parsed} alertas`
      }}}
    }
  });

  // Leyenda manual
  const total = data.reduce((a,b)=>a+b,0);
  document.getElementById('donut-legend').innerHTML = labels.map((l,i)=>`
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};flex-shrink:0;"></span>
      <span style="color:#5a6073;">${l}</span>
      <span style="margin-left:auto;font-weight:500;color:#111318;">${data[i]}</span>
      <span style="color:#9098b0;font-size:11px;">${total?Math.round(data[i]/total*100):0}%</span>
    </div>`).join('');
}

// ── Fetch y renderizado completo ───────────────────────────────────────────
async function refresh() {
  try {
    const [statsRes, alertsRes] = await Promise.all([
      fetch('/api/stats'),
      fetch('/api/alerts'),
    ]);
    const stats  = await statsRes.json();
    const alerts = await alertsRes.json();

    renderMetrics(stats);
    renderAlerts(alerts);
    renderModuleBars(stats.by_modulo);
    renderHourlyChart(stats.hourly);
    renderDonutChart(stats.by_criticidad);

    document.getElementById('last-update').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'});
  } catch (err) {
    console.error('Error al cargar datos:', err);
    document.getElementById('last-update').textContent = 'Error al cargar datos';
  }
}

// Carga inicial + actualización cada 30 s
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
